<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, user-scalable=0"
        />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />

        <title>Umweltatlas Berlin - Karten</title>
        <!-- enter your own Portal Title for the website at this -->
        <link rel="icon" href="./favicon.ico" sizes="any" />
        <link rel="stylesheet" href="../../build/css/masterportal.css" />
        <!-- Here you can configure your own fonts as url -->
    </head>
    <style>
        /* Add a border to menu items right */
        #mp-menu-body-items-secondaryMenu .btn {
            border: 1px solid#ddd;
            margin: 10px 0px;
            border-radius: 5px;
        }

        /* Remove shadow from #add-layer-btn */

        #add-layer-btn {
            box-shadow: none !important;
        }

        /* Styling for both side toggler buttons to ensure they match theme when collapsed */
        #secondaryMenu-toggle-button:not(.expanded),
        #mainMenu-toggle-button:not(.expanded) {
            background-color: #1a4435 !important;
            color: #ffffff !important;
            border-color: #1a4435 !important;
        }
        #secondaryMenu-toggle-button:not(.expanded):hover,
        #secondaryMenu-toggle-button:not(.expanded):focus,
        #secondaryMenu-toggle-button:not(.expanded):active,
        #mainMenu-toggle-button:not(.expanded):hover,
        #mainMenu-toggle-button:not(.expanded):focus,
        #mainMenu-toggle-button:not(.expanded):active {
            background-color: #edf8f4 !important;
            color: #1a4435 !important;
            border-color: #edf8f4 !important;
        }
        
        /* Make them white + dark green icon when active (expanded) */
        #secondaryMenu-toggle-button.expanded,
        #mainMenu-toggle-button.expanded {
            background-color: #ffffff !important;
            color: #1a4435 !important;
            border-color: #e3e3e3 !important; 
        }

        /* Zoom wrapper unified vertical pill */
        #zoom-in-and-out-buttons {
            background-color: #1a4435 !important;
            border-radius: 2rem !important;
            padding: 0.15rem !important;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #zoom-in-and-out-buttons .control-icon-controls {
            background-color: transparent !important;
            color: #ffffff !important;
            border: none !important;
            margin: 0 !important; /* override the my-2 class */
            border-radius: 50% !important;
            box-shadow: none !important; 
            outline: none !important;
        }

        /* Prevent focus from sticking to the hover color after a click */
        #zoom-in-and-out-buttons .control-icon-controls:focus {
            background-color: transparent !important;
            color: #ffffff !important;
        }

        #zoom-in-and-out-buttons .control-icon-controls:hover,
        #zoom-in-and-out-buttons .control-icon-controls:active {
            background-color: #edf8f4 !important;
            color: #1a4435 !important;
        }

        /* ?? */
        @media (min-width: 575px) {
            #secondaryMenu-toggle-button .bi-tools {
                font-size: 20px;
            }
        }

        /* Add a loader */
        @keyframes spin {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }

        #loader {
            width: 100%;
            height: 100%;
            top: 40%;
            position: fixed;
            text-align: center;
        }

        #portal-logo {
            animation: fade 2s infinite, spin 2s infinite;
        }

        /* ?? */
        .layer-selection-subheadline {
            display: none !important;
        }

        .layer-selection-navigation-baselayer {
            display: none !important;
        }

        /* Quick fix: Centers Header and icon and makes header smaller */
        #mp-subHeader-mainMenu a{
            align-items: center
        }

        #mp-subHeader-mainMenu h1{
            margin-bottom: 0px;
        }
        #mp-menu-mainMenu .mp-menu-navigation-moduletitle {
            padding-top: 12px !important;
        }
        #mp-menu-mainMenu h5 {
            padding-top: 6px !important;
        }   

        @media (max-width: 767px) {
            #mp-subHeader-mainMenu h1 {
                font-size: 28px !important;
            }
            #mp-menu-mainMenu .mp-menu-navigation-moduletitle {
                font-size: 24px !important;
                padding-top: 10px !important;
            }
            #mp-menu-mainMenu h5 {
                font-size: 20px !important;
            }
        }

        #mp-menu-body-items-mainMenu .btn-title{
            overflow: visible;
        }

        /* Quick fix: Hides ' - Luftbild' in Luftbilder Zeitreihe Tool */
        #module-layer-slider-handle option{
            height: 35px;
            overflow: hidden;
        }
        #corner-logo {
            position: fixed;
            bottom: 4rem; /* Abstand vom unteren Rand vergrößert */
            right: 6rem;  /* Abstand vom rechten Rand vergrößert */
        }

        #corner-logo img {
            width: 275px; /* Größe des Logos angepasst */
            height: auto; /* Proportionaler Skalierung */
            background-color: white;
        }
        /* Anpassungen für kleinere Bildschirme */
        @media (max-width: 767px) {
            #corner-logo {
                bottom: 3rem; /* Weniger Abstand für mobile Geräte */
                right: 3rem;  /* Weniger Abstand für mobile Geräte */
            }

            #corner-logo img {
                width: 175px; /* Reduziere die Größe des Logos auf kleineren Bildschirmen */
            }
        }

        /* Anpassungen für sehr kleine Bildschirme */
        @media (max-width: 480px) {
            #corner-logo {
                bottom: 2rem; /* Noch weniger Abstand */
                right: 2rem;  /* Noch weniger Abstand */
            }

            #corner-logo img {
                width: 175px; /* Noch kleinere Logo-Größe */
            }
        }


        /* Hide hr in Tool sidebar */
        #mp-body-secondaryMenu hr{
            display: none;
        }

        .bi-info-circle::before {
            content: "" !important;
            display: inline-block;
            width: 28px;
            height: 28px;
            background-image:  url("./resources/img/B_Information_5_N_RGB 1.svg");
            background-size: contain;
            background-repeat: no-repeat;
        }

        #mp-menu-body-items-mainMenu .bi-book::before {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            background-image:  url("./resources/img/B_ICON_BUCH_N_RGB 1.svg");
            background-size: contain;
            background-repeat: no-repeat;
            vertical-align: -0.25em;
        }

        #mp-menu-body-items-mainMenu .bi-share::before {
            content: "";
            display: inline-block;
            width: 28px;
            height: 28px;
            background-image:  url("./resources/img/B_ICON_lebenswerte_Stadt_N_RGB 1.svg");
            background-size: contain;
            background-repeat: no-repeat;
            vertical-align: -0.5em;
        }

        #mp-menu-body-items-mainMenu .bi-info-circle::before {
            content: "";
            display: inline-block;
            width: 18.2px;
            height: 18.2px;
            background-image:  url("./resources/img/B_ICON_GLUEHBIRNE_N_RGB 1.svg");
            background-size: contain;
            background-repeat: no-repeat;
        }

        /* Optimise Logo and Title Wrapping */
        .mp-menu-logo {
            flex-wrap: nowrap !important;
            align-items: flex-start !important;
        }
        .mp-menu-logo img {
            /* Verschiebe Icon ganz leicht nach oben */
            margin-top: 0 !important;
            transform: translateY(-7px) !important;
        }
        .mp-menu-logo h1 {
            /* Text darf NICHT innerhalb des Wortes umbrechen (also kein Umw-elta-tlas) */
            overflow-wrap: normal !important;
            word-wrap: normal !important;
            word-break: normal !important;
            hyphens: none !important;
            white-space: normal !important;
            line-height: 1.1 !important;
            margin-bottom: 0 !important;
            min-width: 0;
        }
    </style>
    <body style="background-color: #edf8f4">
        <!-- custom loader -->
        <div id="loader">
            <h2><span class="bold">Umweltatlas Berlin</span> </h2>
            <div id="portal-logo">
                <img
                    src="./resources/img/logo-umweltatlas.svg"
                    alt="Umweltatlas Berlin"
                />
            </div>
            <p class="mt-3">Karten werden geladen ...</p>
        </div>
        <!-- custom loader end -->
    <div id="corner-logo">
        <img src="./resources/img/B_SEN_SBW_Logo_DE_H_PT_4C.svg" alt="Logo der Senatsverwaltung für Stadtentwicklung, Bauen und Wohnen" />
    </div>
        <div id="masterportal-root"></div>
        <script
            type="text/javascript"
            src="../../build/js/masterportal.js"
        ></script>
    </body>
</html>
